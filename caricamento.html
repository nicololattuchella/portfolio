<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Portfolio in corso | Nicolò Lattuchella</title>

  <style>
    :root {
      --bg: #030008;
      --black: #05000b;
      --purple: #9d4edd;
      --purple-light: #c77dff;
      --purple-dark: #5a189a;
      --text: #f7efff;
      --muted: #bda9d6;
      --glass: rgba(255, 255, 255, 0.075);
      --border: rgba(255, 255, 255, 0.16);
      --shadow: 0 30px 120px rgba(157, 78, 221, 0.32);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(157, 78, 221, 0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(90, 24, 154, 0.35), transparent 38%),
        linear-gradient(135deg, #030008, #090010 50%, #020104);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, black, transparent 85%);
      pointer-events: none;
    }

    .orb {
      position: fixed;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      filter: blur(75px);
      opacity: 0.45;
      animation: float 8s ease-in-out infinite;
      z-index: 0;
    }

    .orb.one {
      top: -90px;
      left: -80px;
      background: var(--purple);
    }

    .orb.two {
      right: -100px;
      bottom: -90px;
      background: var(--purple-light);
      animation-delay: 2s;
    }

    .orb.three {
      left: 45%;
      top: 65%;
      background: var(--purple-dark);
      animation-delay: 4s;
    }

    @keyframes float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(35px, -35px) scale(1.08);
      }
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(100%, 760px);
      padding: 58px 42px;
      text-align: center;
      border-radius: 34px;
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.12),
        rgba(255, 255, 255, 0.045)
      );
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      overflow: hidden;
      animation: cardEntrance 1s ease forwards;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(199, 125, 255, 0.55),
        transparent
      );
      opacity: 0.45;
      animation: borderMove 4s linear infinite;
      z-index: -1;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 33px;
      background: linear-gradient(
        145deg,
        rgba(7, 0, 15, 0.88),
        rgba(18, 5, 31, 0.72)
      );
      z-index: -1;
    }

    @keyframes borderMove {
      0% {
        transform: translateX(-60%) rotate(0deg);
      }

      100% {
        transform: translateX(60%) rotate(360deg);
      }
    }

    @keyframes cardEntrance {
      from {
        opacity: 0;
        transform: translateY(35px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .logo {
      width: 92px;
      height: 92px;
      margin: 0 auto 28px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--purple-dark), var(--purple-light));
      box-shadow:
        0 0 35px rgba(199, 125, 255, 0.65),
        inset 0 0 18px rgba(255, 255, 255, 0.18);
      animation: pulse 2.8s ease-in-out infinite;
    }

    .logo span {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -2px;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 35px rgba(199, 125, 255, 0.65);
      }

      50% {
        transform: scale(1.06);
        box-shadow: 0 0 65px rgba(199, 125, 255, 0.95);
      }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 10px 16px;
      margin-bottom: 24px;
      border-radius: 999px;
      color: var(--purple-light);
      background: rgba(157, 78, 221, 0.14);
      border: 1px solid rgba(199, 125, 255, 0.28);
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--purple-light);
      box-shadow: 0 0 18px rgba(199, 125, 255, 0.9);
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% {
        opacity: 1;
      }

      50% {
        opacity: 0.35;
      }
    }

    h1 {
      font-size: clamp(2.6rem, 8vw, 5.4rem);
      line-height: 0.95;
      letter-spacing: -0.08em;
      margin-bottom: 22px;
    }

    h1 span {
      color: var(--purple-light);
      text-shadow: 0 0 38px rgba(199, 125, 255, 0.78);
    }

    p {
      max-width: 590px;
      margin: 0 auto;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1.05rem;
    }

    .loader {
      width: min(100%, 430px);
      height: 12px;
      margin: 38px auto 18px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .loader span {
      display: block;
      height: 100%;
      width: 45%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--purple-dark), var(--purple), var(--purple-light));
      box-shadow: 0 0 25px rgba(199, 125, 255, 0.8);
      animation: loading 1.7s ease-in-out infinite;
    }

    @keyframes loading {
      0% {
        transform: translateX(-110%);
      }

      100% {
        transform: translateX(240%);
      }
    }

    .status {
      color: var(--purple-light);
      font-weight: 700;
      font-size: 0.92rem;
      letter-spacing: 0.05em;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 34px;
    }

    .socials a {
      color: var(--text);
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.13);
      transition: 0.3s ease;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .socials a:hover {
      transform: translateY(-4px);
      background: rgba(157, 78, 221, 0.22);
      border-color: rgba(199, 125, 255, 0.55);
      box-shadow: 0 12px 35px rgba(157, 78, 221, 0.35);
    }

    .footer-text {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.42);
      font-size: 0.86rem;
      z-index: 1;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .card {
        padding: 42px 24px;
        border-radius: 28px;
      }

      .card::after {
        border-radius: 27px;
      }

      .logo {
        width: 76px;
        height: 76px;
        border-radius: 22px;
      }

      .logo span {
        font-size: 1.65rem;
      }

      p {
        font-size: 0.98rem;
      }

      .socials a {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="orb one"></div>
  <div class="orb two"></div>
  <div class="orb three"></div>

  <main class="card">
    <div class="logo">
      <span>NL</span>
    </div>

    <div class="badge">
      <span class="dot"></span>
      Portfolio in sviluppo
    </div>

    <h1>
      Lavori in <span>corso</span>
    </h1>

    <p>
      Sto preparando il mio portfolio personale: progetti, esperienze, certificazioni
      e competenze in ambito Cybersecurity, Networking, Cloud e DevOps saranno presto online.
    </p>

    <div class="loader">
      <span></span>
    </div>

    <div class="status">
      Build in progress...
    </div>

    <div class="socials">
      <a href="https://github.com/" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/" target="_blank">LinkedIn</a>
      <a href="mailto:inserisci-la-tua-email@example.com">Email</a>
    </div>
  </main>

  <div class="footer-text">
    © 2026 Nicolò Lattuchella
  </div>
</body>
</html>
